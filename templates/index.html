<!DOCTYPE html>
<html lang="en">
<body>
    <h1>Homework Diary</h1>
    <input type="file" id="pdfInput" multiple accept=".pdf">
    <button onclick="uploadFiles()">Process PDFs</button>
    <div id="results"></div>

    <script>
        async function uploadFiles() {
            let formData = new FormData();
            let files = document.getElementById('pdfInput').files;
            for(let f of files) formData.append('pdfs', f);
            let res = await fetch('/process', {method: 'POST', body: formData});
            let data = await res.json();
            if (data.error) { alert(data.error); return; }

            let html = `<h2>Week: ${data.week}</h2><table border="1"><tr><th>Subject</th><th>Dates</th><th>Tasks</th><th>Submission</th></tr>`;
            data.rows.forEach(r => {
                html += `<tr><td>${r.subject}</td><td>${r.reinf_dates.join('<br>')}</td><td>${r.reinf_lines.join('<br>')}</td><td>${r.submission}</td></tr>`;
            });
            document.getElementById('results').innerHTML = html + '</table>';
        }
    </script>
</body>
</html>
