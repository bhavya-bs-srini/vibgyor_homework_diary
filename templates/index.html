<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIBGYOR Diary Summary</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: #070b14;
        color: #e2e8f0;
        font-family: 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
    }

    /* Animated background */
    body::before {
        content: '';
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(ellipse at 20% 20%, rgba(37,99,235,0.08) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.08) 0%, transparent 50%);
        z-index: 0;
        pointer-events: none;
    }

    .page-wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 960px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Header */
    .header {
        text-align: center;
        margin-bottom: 36px;
    }

    .header .logo {
        font-size: 2.8rem;
        margin-bottom: 8px;
    }

    .header h1 {
        font-size: 1.9rem;
        font-weight: 700;
        background: linear-gradient(120deg, #60a5fa, #a78bfa, #60a5fa);
        background-size: 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 3s infinite linear;
    }

    .header p {
        color: #64748b;
        margin-top: 6px;
        font-size: 0.95rem;
    }

    @keyframes shimmer {
        0% { background-position: 0% }
        100% { background-position: 200% }
    }

    /* Upload card */
    .upload-card {
        background: linear-gradient(145deg, #0f1629, #141928);
        border: 1px solid #1e2d4a;
        border-radius: 20px;
        padding: 32px;
        width: 100%;
        margin-bottom: 28px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Drop zone */
    .drop-zone {
        border: 2px dashed #1e3a5f;
        border-radius: 14px;
        padding: 36px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        background: rgba(37,99,235,0.03);
        margin-bottom: 20px;
        position: relative;
    }

    .drop-zone:hover, .drop-zone.dragover {
        border-color: #3b82f6;
        background: rgba(37,99,235,0.08);
    }

    .drop-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
    }

    .drop-zone .icon { font-size: 2.4rem; margin-bottom: 10px; }
    .drop-zone .label { color: #94a3b8; font-size: 0.95rem; }
    .drop-zone .label span { color: #60a5fa; font-weight: 600; }
    .drop-zone .file-list { margin-top: 12px; color: #60a5fa; font-size: 0.9rem; font-weight: 500; }

    /* Steps */
    .steps {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 20px;
    }

    .step {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.82rem;
        font-weight: 600;
        color: #334155;
        background: rgba(255,255,255,0.03);
        border: 1px solid #1e2a40;
        transition: all 0.3s ease;
    }

    .step .dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: #334155;
        transition: all 0.3s ease;
    }

    .step.active {
        color: #60a5fa;
        border-color: #2563eb;
        background: rgba(37,99,235,0.1);
    }

    .step.active .dot {
        background: #60a5fa;
        box-shadow: 0 0 6px #60a5fa;
        animation: pulse 1s infinite;
    }

    .step.done { color: #34d399; border-color: #065f46; background: rgba(52,211,153,0.07); }
    .step.done .dot { background: #34d399; }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
    }

    /* Button */
    .btn {
        background: linear-gradient(120deg, #2563eb, #7c3aed);
        color: white;
        padding: 14px 32px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
        font-size: 1rem;
        width: 100%;
        letter-spacing: 0.3px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 20px rgba(37,99,235,0.3);
        position: relative;
        overflow: hidden;
    }

    .btn:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 6px 28px rgba(37,99,235,0.45);
    }

    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .btn .spinner {
        display: inline-block;
        width: 16px; height: 16px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    #results-area { width: 100%; }

    .week-card {
        background: linear-gradient(145deg, #0f1629, #141928);
        border: 1px solid #1e2d4a;
        border-radius: 20px;
        padding: 28px;
        margin-bottom: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .week-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 10px;
    }

    .week-title {
        font-size: 1.15rem;
        font-weight: 700;
        color: #60a5fa;
    }

    .week-range {
        font-size: 0.8rem;
        color: #475569;
        background: rgba(255,255,255,0.04);
        border: 1px solid #1e2a40;
        padding: 4px 12px;
        border-radius: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead tr {
        background: rgba(37,99,235,0.08);
        border-radius: 8px;
    }

    th {
        text-align: left;
        color: #475569;
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 10px 14px;
        border-bottom: 1px solid #1e2a40;
    }

    td {
        padding: 13px 14px;
        border-bottom: 1px solid #111827;
        font-size: 0.92rem;
        vertical-align: top;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: rgba(255,255,255,0.02); }

    .subject-badge {
        display: inline-block;
        background: linear-gradient(120deg, rgba(37,99,235,0.2), rgba(124,58,237,0.2));
        border: 1px solid rgba(96,165,250,0.2);
        color: #93c5fd;
        padding: 3px 10px;
        border-radius: 6px;
        font-weight: 600;
        font-size: 0.88rem;
    }

    .reinf-text { color: #cbd5e1; line-height: 1.5; }

    .submission-badge {
        display: inline-block;
        background: rgba(52,211,153,0.1);
        border: 1px solid rgba(52,211,153,0.2);
        color: #6ee7b7;
        padding: 3px 10px;
        border-radius: 6px;
        font-size: 0.85rem;
        white-space: nowrap;
    }

    /* Error */
    .error-card {
        background: #1a0a0a;
        border: 1px solid #7f1d1d;
        border-radius: 16px;
        padding: 24px;
        width: 100%;
        margin-bottom: 20px;
        color: #fca5a5;
        animation: fadeUp 0.3s ease forwards;
    }

    .error-card h3 { margin-bottom: 8px; color: #f87171; }
    .error-card code { font-size: 0.88rem; word-break: break-word; }

    .empty-card {
        text-align: center;
        padding: 40px;
        color: #475569;
        background: linear-gradient(145deg, #0f1629, #141928);
        border: 1px solid #1e2d4a;
        border-radius: 20px;
    }

    .empty-card .icon { font-size: 2.5rem; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="page-wrapper">

    <div class="header">
        <div class="logo">📓</div>
        <h1>VIBGYOR Diary Summary</h1>
        <p>Upload your daily diary PDFs to extract reinforcement tasks</p>
    </div>

    <div class="upload-card">
        <div class="drop-zone" id="dropZone">
            <input type="file" id="fi" multiple accept=".pdf" onchange="updateFileList()"/>
            <div class="icon">📂</div>
            <div class="label">Drag & drop PDFs here or <span>browse files</span></div>
            <div class="file-list" id="fileList"></div>
        </div>

        <div class="steps" id="steps">
            <div class="step active" id="s1"><div class="dot"></div> Upload</div>
            <div class="step" id="s2"><div class="dot"></div> Processing</div>
            <div class="step" id="s3"><div class="dot"></div> Done</div>
        </div>

        <button class="btn" id="btn" onclick="run()">
            ✨ Generate Summary
        </button>
    </div>

    <div id="results-area"></div>

</div>

<script>
const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    document.getElementById('fi').files = e.dataTransfer.files;
    updateFileList();
});

function updateFileList() {
    const files = document.getElementById('fi').files;
    const list = document.getElementById('fileList');
    if (files.length === 0) { list.textContent = ''; return; }
    list.textContent = `${files.length} file${files.length > 1 ? 's' : ''} selected: ` +
        Array.from(files).map(f => f.name).join(', ');
}

function setStep(active) {
    ['s1','s2','s3'].forEach((id, i) => {
        const el = document.getElementById(id);
        el.className = 'step' + (i + 1 < active ? ' done' : i + 1 === active ? ' active' : '');
    });
}

async function run() {
    const btn = document.getElementById('btn');
    const files = document.getElementById('fi').files;
    const area = document.getElementById('results-area');

    if (!files.length) { alert('Please select PDF files first.'); return; }

    area.innerHTML = '';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Processing...';
    setStep(2);

    const fd = new FormData();
    for (let f of files) fd.append('pdfs', f);

    try {
        const r = await fetch('/process', { method: 'POST', body: fd });
        let d;
        try {
            d = await r.json();
        } catch {
            const raw = await r.text().catch(() => '(could not read response)');
            showError('Unexpected server response', raw.substring(0, 500));
            setStep(1);
            return;
        }

        if (!r.ok || d.error) {
            showError('Server error', d.error || `HTTP ${r.status}`);
            setStep(1);
            return;
        }

        setStep(3);

        if (d.weeks && d.weeks.length > 0) {
            render(d.weeks);
            // Scroll results to top
            setTimeout(() => {
                document.getElementById('results-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        } else {
            area.innerHTML = `
                <div class="empty-card">
                    <div class="icon">🔍</div>
                    <p>No reinforcement data found in the selected files.</p>
                </div>`;
        }

    } catch (e) {
        showError('Network error', e.message);
        setStep(1);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '✨ Generate Summary';
    }
}

function showError(title, detail) {
    document.getElementById('results-area').innerHTML = `
        <div class="error-card">
            <h3>⚠️ ${title}</h3>
            <code>${detail}</code>
        </div>`;
}

function render(weeks) {
    const area = document.getElementById('results-area');
    area.innerHTML = weeks.map((wk, i) => `
        <div class="week-card" style="animation-delay:${i * 0.08}s">
            <div class="week-header">
                <div class="week-title">📅 Week of ${wk.monday}</div>
                <div class="week-range">${wk.monday} – ${wk.friday}</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Reinforcement</th>
                        <th>Submission Date</th>
                    </tr>
                </thead>
                <tbody>
                    ${wk.rows.map(r => `
                        <tr>
                            <td><span class="subject-badge">${r.subject}</span></td>
                            <td><div class="reinf-text">${r.reinf_lines.join('<br/>')}</div></td>
                            <td><span class="submission-badge">📌 ${r.submission}</span></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `).join('');
}
</script>
</body>
</html>
